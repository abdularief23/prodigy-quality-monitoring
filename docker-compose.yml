services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 5000
      NODE_ENV: production
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_ENDPOINT: ${AZURE_ENDPOINT:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "5174:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
